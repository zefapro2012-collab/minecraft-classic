<!doctype html>
<html lang="id">
<head>
  <meta charset="utf-8" />
  <title>Voxel Demo (Minecraft-like) — Prototype</title>
  <style>
    html,body{height:100%;margin:0;overflow:hidden;background:#87ceeb;}
    #info{position:absolute;left:10px;top:10px;color:#111;background:rgba(255,255,255,0.8);padding:8px;border-radius:6px;font-family:Arial,Helvetica,sans-serif}
    canvas{display:block}
  </style>
</head>
<body>
<div id="info">
  Klik untuk mulai • WASD bergerak • Klik kiri hapus • Klik kanan tambah • 1/2/3 ganti blok
</div>

<script type="module">
import * as THREE from 'https://unpkg.com/three@0.152.2/build/three.module.js';
import { PointerLockControls } from 'https://unpkg.com/three@0.152.2/examples/jsm/controls/PointerLockControls.js';

const scene = new THREE.Scene();
scene.fog = new THREE.FogExp2(0x87ceeb, 0.0025);

const camera = new THREE.PerspectiveCamera(75, innerWidth/innerHeight, 0.1, 1000);
camera.position.set(0, 10, 0);

const renderer = new THREE.WebGLRenderer({antialias:true});
renderer.setSize(innerWidth, innerHeight);
renderer.setClearColor(0x87ceeb);
document.body.appendChild(renderer.domElement);

window.addEventListener('resize', ()=> {
  camera.aspect = innerWidth/innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(innerWidth, innerHeight);
});

// lights
const hemi = new THREE.HemisphereLight(0xffffff, 0x444444, 0.9);
hemi.position.set(0, 200, 0); scene.add(hemi);
const dir = new THREE.DirectionalLight(0xffffff, 0.6);
dir.position.set(100,100,50); scene.add(dir);

// controls
const controls = new PointerLockControls(camera, renderer.domElement);
document.body.addEventListener('click', ()=> controls.lock());
scene.add(controls.getObject());

// simple movement
const velocity = new THREE.Vector3();
const direction = new THREE.Vector3();
const move = { forward:false, backward:false, left:false, right:false, jump:false };
let canJump = false;
document.addEventListener('keydown', e=>{
  if(e.code==='KeyW') move.forward=true;
  if(e.code==='KeyS') move.backward=true;
  if(e.code==='KeyA') move.left=true;
  if(e.code==='KeyD') move.right=true;
  if(e.code==='Space' && canJump){ velocity.y = 8; canJump=false; }
  if(e.key==='1') selectedBlock = 1;
  if(e.key==='2') selectedBlock = 2;
  if(e.key==='3') selectedBlock = 3;
});
document.addEventListener('keyup', e=>{
  if(e.code==='KeyW') move.forward=false;
  if(e.code==='KeyS') move.backward=false;
  if(e.code==='KeyA') move.left=false;
  if(e.code==='KeyD') move.right=false;
});

// world data
const blocks = new Map(); // key "x,y,z" -> mesh
const blockSize = 1;
const blockMaterials = {
  1: new THREE.MeshStandardMaterial({color:0x8B5A2B}), // dirt
  2: new THREE.MeshStandardMaterial({color:0x228B22}), // grass
  3: new THREE.MeshStandardMaterial({color:0x808080})  // stone
};
let selectedBlock = 2;

// simple terrain generation (small)
const SIZE = 32;
for(let x=-SIZE/2; x<SIZE/2; x++){
  for(let z=-SIZE/2; z<SIZE/2; z++){
    const height = Math.floor(3 + 2*Math.sin((x+z)/6) + Math.random()*1.5);
    for(let y=0; y<height; y++){
      const t = (y === height-1) ? 2 : (y<2?1:3); // top grass, below dirt/stone
      addBlock(x, y, z, t, false);
    }
  }
}

// ground plane far away for sky intersection
const groundGeo = new THREE.PlaneGeometry(1000,1000);
const groundMat = new THREE.MeshBasicMaterial({visible:false});
const ground = new THREE.Mesh(groundGeo, groundMat);
ground.rotation.x = -Math.PI/2;
ground.position.y = -1;
scene.add(ground);

// raycasting for interacting
const raycaster = new THREE.Raycaster();
const mouse = new THREE.Vector2();
renderer.domElement.addEventListener('pointerdown', onPointerDown);

function onPointerDown(e){
  e.preventDefault();
  const rect = renderer.domElement.getBoundingClientRect();
  mouse.x = ((e.clientX - rect.left) / rect.width) * 2 - 1;
  mouse.y = -((e.clientY - rect.top) / rect.height) * 2 + 1;
  raycaster.setFromCamera(mouse, camera);
  const objs = Array.from(blocks.values());
  const intersects = raycaster.intersectObjects(objs, false);
  if(intersects.length>0){
    const it = intersects[0];
    const mesh = it.object;
    const pos = mesh.userData.coord; // {x,y,z}
    if(e.button === 0){
      // left click: remove
      removeBlock(pos.x, pos.y, pos.z);
    } else if(e.button === 2){
      // right click: add block adjacent to face
      const normal = it.face.normal;
      const nx = pos.x + Math.round(normal.x);
      const ny = pos.y + Math.round(normal.y);
      const nz = pos.z + Math.round(normal.z);
      addBlock(nx, ny, nz, selectedBlock, true);
    }
  } else {
    // if empty, allow adding to ground hit
    const groundHit = raycaster.intersectObject(ground, false);
    if(groundHit.length>0 && e.button===2){
      const p = groundHit[0].point;
      const gx = Math.floor(p.x + 0.5);
      const gz = Math.floor(p.z + 0.5);
      addBlock(gx, 0, gz, selectedBlock, true);
    }
  }
}

// prevent context menu on right click
window.addEventListener('contextmenu', e=> e.preventDefault());

function keyFor(x,y,z){ return `${x},${y},${z}`; }
function addBlock(x,y,z,type,createMesh=true){
  const k = keyFor(x,y,z);
  if(blocks.has(k)) return;
  const geo = new THREE.BoxGeometry(blockSize, blockSize, blockSize);
  const mesh = new THREE.Mesh(geo, blockMaterials[type] || blockMaterials[1]);
  mesh.position.set(x*blockSize, y*blockSize + blockSize/2, z*blockSize);
  mesh.userData.coord = {x,y,z};
  scene.add(mesh);
  blocks.set(k, mesh);
}
function removeBlock(x,y,z){
  const k = keyFor(x,y,z);
  const m = blocks.get(k);
  if(!m) return;
  scene.remove(m);
  m.geometry.dispose();
  // note: material reuse, so we don't dispose materials here
  blocks.delete(k);
}

// simple animation / physics
let prevTime = performance.now();
function animate(){
  requestAnimationFrame(animate);
  const time = performance.now();
  const delta = (time - prevTime)/1000;
  prevTime = time;

  // movement logic (simple)
  velocity.x -= velocity.x * 10.0 * delta;
  velocity.z -= velocity.z * 10.0 * delta;
  velocity.y -= 9.8 * 2.0 * delta; // gravity

  direction.z = Number(move.forward) - Number(move.backward);
  direction.x = Number(move.right) - Number(move.left);
  direction.normalize();

  const speed = 6.0;
  if(move.forward || move.backward) velocity.z -= direction.z * speed * delta;
  if(move.left || move.right) velocity.x -= direction.x * speed * delta;

  controls.moveRight(-velocity.x * delta);
  controls.moveForward(-velocity.z * delta);
  controls.getObject().position.y += velocity.y * delta;

  if(controls.getObject().position.y < 1.5){
    velocity.y = 0;
    controls.getObject().position.y = 1.5;
    canJump = true;
  }

  renderer.render(scene, camera);
}
animate();
</script>
</body>
</html>
